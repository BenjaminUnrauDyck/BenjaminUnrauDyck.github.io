# change the followings to match your Github username and repo name
baseurl: "" # the name of your github repo
url: "https://BenjaminUnrauDyckGH.github.io" # the url of your github pages

# site information used in page title, meta data etc.
title: "Benjamin Unrau Dyck - Portfolio"
description: A Github Pages (Jekyll) template based on TailwindCSS

# color theme for links
theme-color: indigo # indigo|yellow|pink|green|stone|

# homepage information
author: Benjamin Unrau Dyck
author-bio: 23-year-old Paraguayan student pursuing a Bachelor’s Degree in Computer Science
author-image: logos/11.png  # file must be in the /assets/img/ folder

# navigation menu
show-nav-menu: true

nav-menu:
